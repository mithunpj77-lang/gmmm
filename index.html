<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Trebuchet MS',sans-serif;
}

body{
    min-height:100vh;
    overflow:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(-45deg,#ffd6e7,#ffe9b3,#fff9d6,#dff8ea);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:700px;
    max-height:90vh;
    overflow-y:auto;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    padding:28px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

/* Optional: Hide scrollbar */
.card::-webkit-scrollbar{
    width:0;
}

h1{
    font-size:42px;
    color:#ff5f8f;
    margin-bottom:10px;
    text-shadow:0 0 12px #ffc6d8;
}

#message{
    font-size:20px;
    color:#444;
    min-height:35px;
    margin-bottom:20px;
    font-weight:bold;
}

.cats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:20px 0;
    flex-wrap:wrap;
}

.cat{
    font-size:60px;
    animation:bounce 2s infinite;
    cursor:pointer;
    transition:.3s;
}

.cat:nth-child(2){
    animation-delay:.3s;
}

.cat:nth-child(3){
    animation-delay:.6s;
}

.cat:hover{
    transform:scale(1.2);
}

.name{
    font-size:18px;
    font-weight:bold;
    color:#ff5f8f;
    margin-top:8px;
}

.footer{
    margin-top:20px;
    font-size:18px;
    color:#666;
    line-height:1.6;
}

.footer span{
    color:#ff5f8f;
    font-weight:bold;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

.paw{
    position:fixed;
    font-size:25px;
    animation:float 10s linear infinite;
    opacity:.35;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(0deg);
    }
    100%{
        transform:translateY(-100px) rotate(360deg);
    }
}

button{
    margin-top:20px;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:#ff77a8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 18px rgba(255,119,168,.4);
}

button:hover{
    transform:scale(1.08);
    background:#ff5f8f;
}

@media(max-width:600px){

    .card{
        padding:22px;
    }

    h1{
        font-size:34px;
    }

    #message{
        font-size:18px;
    }

    .cat{
        font-size:50px;
    }

    .footer{
        font-size:16px;
    }

    button{
        font-size:16px;
        padding:10px 22px;
    }

}
</style>

</head>

<body>

<div class="card">

<h1>☀️ Good Morning,<br>Angel Paws 🐾</h1>

<div id="message"></div>

<div class="cats">

<div>
<div class="cat">🧡🐱</div>
<div class="name">Penny</div>
</div>

<div>
<div class="cat">🤍🧡🐱</div>
<div class="name">Kiki</div>
</div>

<div>
<div class="cat">🤎🐱</div>
<div class="name">Sheldon</div>
</div>

</div>

<div class="footer">
May your coffee be warm ☕,<br>
your heart be happy ❤️,<br>
and may <span>Penny</span>, <span>Kiki</span> & <span>Sheldon</span><br>
fill your day with purrs and cuddles. 🐾
</div>

<button onclick="showLove()">
🐾 Tap Me
</button>

</div>

<script>
const text = "Just a little surprise to make you smile today. 💕";

let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(type,70);
    }
}

type();

function showLove(){
    alert("Have the most wonderful day, Angel Paws! ❤️🐾");
}

for(let i=0;i<25;i++){

    let paw=document.createElement("div");

    paw.className="paw";
    paw.innerHTML="🐾";
    paw.style.left=Math.random()*100+"vw";
    paw.style.animationDuration=(6+Math.random()*8)+"s";
    paw.style.animationDelay=Math.random()*6+"s";
    paw.style.fontSize=(15+Math.random()*20)+"px";

    document.body.appendChild(paw);
}
</script>

</body>
</html>
