<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Trebuchet MS',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ffd6e7,#ffe9b3,#fff9d6,#dff8ea);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{

width:90%;
max-width:750px;
background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);
padding:45px;
border-radius:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.15);

}

h1{

font-size:58px;
color:#ff5f8f;
margin-bottom:10px;
text-shadow:0 0 15px #ffc6d8;

}

#message{

font-size:24px;
color:#444;
height:40px;
margin-bottom:35px;
font-weight:bold;

}

.cats{

display:flex;
justify-content:center;
gap:40px;
margin:30px 0;

}

.cat{

font-size:80px;
animation:bounce 2s infinite;
cursor:pointer;
transition:.3s;

}

.cat:nth-child(2){
animation-delay:.3s;
}

.cat:nth-child(3){
animation-delay:.6s;
}

.cat:hover{
transform:scale(1.2);
}

.name{

font-size:20px;
font-weight:bold;
color:#ff5f8f;
margin-top:8px;

}

.footer{

margin-top:30px;
font-size:20px;
color:#666;

}

.footer span{

color:#ff5f8f;
font-weight:bold;

}

@keyframes bounce{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}

}

.paw{

position:absolute;
font-size:25px;
animation:float 10s linear infinite;
opacity:.4;

}

@keyframes float{

0%{
transform:translateY(100vh) rotate(0deg);
}

100%{

transform:translateY(-100px) rotate(360deg);

}

}

button{

margin-top:25px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff77a8;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<div class="card">

<h1>☀️ Good Morning,<br>Angel Paws 🐾</h1>

<div id="message"></div>

<div class="cats">

<div>
<div class="cat">🧡🐱</div>
<div class="name">Penny</div>
</div>

<div>
<div class="cat">🤍🧡🐱</div>
<div class="name">Kiki</div>
</div>

<div>
<div class="cat">🤎🐱</div>
<div class="name">Sheldon</div>
</div>

</div>

<div class="footer">

May your coffee be warm ☕,<br>
your heart be happy ❤️,<br>
and may <span>Penny</span>, <span>Kiki</span> & <span>Sheldon</span><br>
fill your day with purrs and cuddles. 🐾

</div>

<button onclick="showLove()">
🐾 Tap Me
</button>

</div>

<script>

const text="Just a little surprise to make you smile today. 💕";

let i=0;

function type(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(type,70);

}

}

type();

function showLove(){

alert("Have the most wonderful day, Angel Paws! ❤️🐾");

}

for(let i=0;i<25;i++){

let paw=document.createElement("div");

paw.className="paw";

paw.innerHTML="🐾";

paw.style.left=Math.random()*100+"vw";

paw.style.animationDuration=(6+Math.random()*8)+"s";

paw.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(paw);

}

</script>

</body>
</html>
